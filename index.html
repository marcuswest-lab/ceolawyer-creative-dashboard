{name:"AliFaroukie",cost:246.0,leads:null,cpl:null,threePlus:null,cpThreePlus:null,wanted:null,cpWanted:null,sales:null,cps:null,hookRate:28.2,holdRate:30.6,ctrAll:null,ctrLink:null,cpm:27.91,impressions:8814.0,link:"https://www.facebook.com/?feed_demo_ad=6915914314172\u0026h=AQJs9Q--cV9kTJv06930duwI1AY",variations:1},
{name:"Alejandro Testimonial",cost:8.91,leads:null,cpl:null,threePlus:null,cpThreePlus:null,wanted:null,cpWanted:null,sales:null,cps:null,hookRate:null,holdRate:null,ctrAll:null,ctrLink:null,cpm:131.03,impressions:68.0,link:"https://www.facebook.com/?feed_demo_ad=6670775032372\u0026h=AQKClVSKlFxd5ZizUZIC9qN0hDQ",variations:1}]
};

const TABS=[
{key:'statics',label:'Static Ads',count:113,isConcept:false,isVideo:false},
{key:'staticConcepts',label:'Static Concepts',count:36,isConcept:true,isVideo:false},
{key:'videos',label:'Video Ads',count:58,isConcept:false,isVideo:true},
{key:'videoConcepts',label:'Video Concepts',count:33,isConcept:true,isVideo:true}
];

const KPI={
cps:{green:2000,yellow:2500},
cpWanted:{green:5000,yellow:8000},
cpThreePlus:{green:300,yellow:500},
cpl:{green:120,yellow:180},
hookRate:{green:30,yellow:20},
holdRate:{green:30,yellow:20}
};

let curTab=0,sortCol='cost',sortAsc=false,filters={winners:false,spend:false};

function ccBadge(v,metric){
if(v==null||v===0)return'nd';
const k=KPI[metric];if(!k)return'nd';
if(metric==='hookRate'||metric==='holdRate')return v>=k.green?'wk':v>=k.yellow?'of':'ak';
return v<=k.green?'wk':v<=k.yellow?'of':'ak';
}

function fmt$(v){if(v==null)return'<span class="nd">&mdash;</span>';return'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(v){if(v==null)return'<span class="nd">&mdash;</span>';return'$'+Math.round(v).toLocaleString('en-US')}
function fmtN(v){if(v==null)return'<span class="nd">&mdash;</span>';return Math.round(v).toLocaleString('en-US')}
function fmtP(v){if(v==null)return'<span class="nd">&mdash;</span>';return v.toFixed(2)+'%'}
function fmtP1(v){if(v==null)return'<span class="nd">&mdash;</span>';return v.toFixed(1)+'%'}
function fmtBadge(v,metric){
if(v==null)return'<span class="nd">&mdash;</span>';
const cls=ccBadge(v,metric);
if(metric==='hookRate'||metric==='holdRate')return'<span class="'+cls+'">'+v.toFixed(1)+'%</span>';
return'<span class="'+cls+'">$'+Math.round(v).toLocaleString('en-US')+'</span>';
}
function fmtLink(url){
if(!url)return'<span class="nd">&mdash;</span>';
return'<a class="view-link" href="'+url.replace(/\\u0026/g,'&')+'" target="_blank" rel="noopener">View <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 1h7v7M11 1L4.5 7.5"/></svg></a>';
}

function buildLegend(){
const t=TABS[curTab];
let h='';
h+='<div class="legend-item"><span class="dot dot-g"></span>CPS &le; $2,000 | CP3+ &le; $300 | CPL &le; $120</div>';
h+='<div class="legend-item"><span class="dot dot-y"></span>CPS $2,000&ndash;$2,500 | CP3+ $300&ndash;$500 | CPL $120&ndash;$180</div>';
h+='<div class="legend-item"><span class="dot dot-r"></span>CPS &gt; $2,500 | CP3+ &gt; $500 | CPL &gt; $180</div>';
if(t.isVideo){
h+='<div class="legend-item"><span class="dot dot-g"></span>Hook/Hold &ge; 30%</div>';
h+='<div class="legend-item"><span class="dot dot-y"></span>Hook/Hold 20&ndash;30%</div>';
h+='<div class="legend-item"><span class="dot dot-r"></span>Hook/Hold &lt; 20%</div>';
}
h+='<div class="legend-item"><span class="dot dot-gr"></span>No Data</div>';
document.getElementById('legend').innerHTML=h;
}

function buildTabs(){
let h='';
TABS.forEach((t,i)=>{
h+='<div class="tab'+(i===curTab?' active':'')+'" onclick="switchTab('+i+')">'+t.label+' <span class="cnt">('+t.count+')</span></div>';
});
document.getElementById('tabBar').innerHTML=h;
}

function getCols(){
const t=TABS[curTab];
let cols=[
{key:'idx',label:'#',sortable:false,cls:'col-idx'},
{key:'name',label:'Name',sortable:true,cls:'col-name'},
{key:'link',label:'Ad',sortable:false},
];
if(t.isConcept)cols.push({key:'variations',label:'# Ads',sortable:true});
cols.push(
{key:'cost',label:'Spend',sortable:true},
{key:'leads',label:'Leads',sortable:true},
{key:'cpl',label:'CPL',sortable:true,badge:'cpl'},
{key:'threePlus',label:'3+ Leads',sortable:true},
{key:'cpThreePlus',label:'$/3+ Lead',sortable:true,badge:'cpThreePlus'},
{key:'wanted',label:'Wanted',sortable:true},
{key:'cpWanted',label:'$/Wanted',sortable:true,badge:'cpWanted'},
{key:'sales',label:'Sales',sortable:true},
{key:'cps',label:'CPS',sortable:true,badge:'cps'}
);
if(t.isVideo){
cols.push({key:'hookRate',label:'Hook %',sortable:true,badge:'hookRate'});
cols.push({key:'holdRate',label:'Hold %',sortable:true,badge:'holdRate'});
}
cols.push(
{key:'ctrAll',label:'CTR (all)',sortable:true},
{key:'ctrLink',label:'CTR (link)',sortable:true},
{key:'cpm',label:'CPM',sortable:true},
{key:'impressions',label:'Impr',sortable:true}
);
return cols;
}

function renderTable(){
const t=TABS[curTab];
const cols=getCols();
const data=DATA[t.key].slice();
const q=document.getElementById('search').value.toLowerCase();

// Filter
let filtered=data.filter(r=>{
if(q&&!r.name.toLowerCase().includes(q))return false;
if(filters.spend&&(r.cost==null||r.cost<1500))return false;
if(filters.winners&&(r.cps==null||r.cps>2000))return false;
return true;
});

// Sort
filtered.sort((a,b)=>{
let va=a[sortCol],vb=b[sortCol];
if(va==null&&vb==null)return 0;
if(va==null)return 1;
if(vb==null)return -1;
if(typeof va==='string')return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
return sortAsc?va-vb:vb-va;
});

// Header
let th='<tr>';
cols.forEach(c=>{
const sorted=c.key===sortCol;
const arrow=sorted?(sortAsc?'&#9650;':'&#9660;'):'&#9650;';
const cls=(c.cls||'')+(sorted?' sorted':'');
if(c.sortable){
th+='<th class="'+cls+'" onclick="doSort(\''+c.key+'\')">'+c.label+'<span class="arr">'+arrow+'</span></th>';
}else{
th+='<th class="'+cls+'">'+c.label+'</th>';
}
});
th+='</tr>';
document.getElementById('thead').innerHTML=th;

// Body
let tb='';
filtered.forEach((r,i)=>{
tb+='<tr>';
cols.forEach(c=>{
const cls=c.cls||'';
if(c.key==='idx'){tb+='<td class="'+cls+'">'+(i+1)+'</td>';return;}
if(c.key==='name'){tb+='<td class="'+cls+'" title="'+r.name.replace(/"/g,'&quot;')+'">'+r.name+'</td>';return;}
if(c.key==='link'){tb+='<td>'+fmtLink(r.link)+'</td>';return;}
if(c.key==='variations'){tb+='<td>'+fmtN(r.variations)+'</td>';return;}
if(c.key==='cost'){tb+='<td>'+fmt$(r.cost)+'</td>';return;}
if(c.key==='leads'||c.key==='threePlus'||c.key==='wanted'||c.key==='sales'){tb+='<td>'+fmtN(r[c.key])+'</td>';return;}
if(c.badge){tb+='<td>'+fmtBadge(r[c.key],c.badge)+'</td>';return;}
if(c.key==='ctrAll'||c.key==='ctrLink'){tb+='<td>'+fmtP(r[c.key])+'</td>';return;}
if(c.key==='cpm'){tb+='<td>'+fmtD(r[c.key])+'</td>';return;}
if(c.key==='impressions'){tb+='<td>'+fmtN(r[c.key])+'</td>';return;}
tb+='<td>'+fmtN(r[c.key])+'</td>';
});
tb+='</tr>';
});
document.getElementById('tbody').innerHTML=tb;
document.getElementById('rowCount').textContent=filtered.length+' of '+data.length+' creatives';
}

function switchTab(i){curTab=i;sortCol='cost';sortAsc=false;buildTabs();buildLegend();renderTable();}
function doSort(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=false;}renderTable();}
function toggleFilter(f){
filters[f]=!filters[f];
document.getElementById(f==='winners'?'btnWinners':'btnSpend').classList.toggle('active');
renderTable();
}
document.getElementById('search').addEventListener('input',renderTable);

// Init
buildTabs();buildLegend();renderTable();
</script>
</body>
</html>
