let activeTab='static',sortCol='cost',sortDir=-1,filters={win:false,spend:false};

function toggleFilter(f){filters[f]=!filters[f];document.getElementById('btn'+(f==='win'?'Win':'Spend')).classList.toggle('on');render()}

function ccBadge(v,metric){
  if(v==null||v===0)return'nd';
  const k=KPI[metric];if(!k)return'nd';
  return v<=k.green?'wk':v<=k.yellow?'of':'ak';
}

function fmt$(v){if(v==null)return'<span class="nd">—</span>';return'$'+v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}
function fmtSpend(v){if(v==null)return'<span class="nd">—</span>';return'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtN(v){if(v==null)return'<span class="nd">—</span>';return Math.round(v).toLocaleString()}
function fmtPct(v){if(v==null)return'<span class="nd">—</span>';return v.toFixed(2)+'%'}

function badge(v,metric){
  if(v==null)return'<span class="nd">—</span>';
  const c=ccBadge(v,metric);
  return'<span class="'+c+'">'+fmt$(v)+'</span>';
}

function statusBadge(s){
  if(!s)return'<span class="nd">—</span>';
  const sl=s.toLowerCase();
  let cls='st-testing';
  if(sl==='winner')cls='st-winner';
  else if(sl==='loser')cls='st-loser';
  else if(sl.includes('fence'))cls='st-fence';
  else if(sl==='paused'||sl==='past winner'||sl==='killed')cls='st-paused';
  return'<span class="badge '+cls+'">'+s+'</span>';
}

function viewLink(link){
  if(!link)return'<span class="nd">—</span>';
  return'<a class="view" href="'+link+'" target="_blank" rel="noopener">View <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.5 1.5h7v7M10 2L2 10"/></svg></a>';
}

function buildTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML=TABS.map(t=>'<div class="tab'+(t.id===activeTab?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+' <span class="cnt">('+t.count+')</span></div>').join('');
}

function switchTab(id){activeTab=id;sortCol='cost';sortDir=-1;buildTabs();render()}

function render(){
  const tab=TABS.find(t=>t.id===activeTab);
  const isConcept=tab.concept;
  let rows=[...DATA[activeTab]];
  const q=document.getElementById('search').value.toLowerCase();
  if(q)rows=rows.filter(r=>r.name.toLowerCase().includes(q));
  if(filters.win)rows=rows.filter(r=>(r.status||'').toLowerCase()==='winner');
  if(filters.spend)rows=rows.filter(r=>(r.cost||0)>=5000);
  
  rows.sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(av==null&&bv==null)return 0;
    if(av==null)return 1;if(bv==null)return-1;
    return sortDir*(av-bv);
  });
  
  const cols=[
    {key:'idx',label:'#',sort:false},
    {key:'name',label:'NAME',sort:false},
    {key:'link',label:'AD',sort:false},
    isConcept?{key:'variations',label:'# ADS',sort:true}:{key:'status',label:'STATUS',sort:false},
    {key:'cost',label:'SPEND',sort:true},
    {key:'leads',label:'LEADS',sort:true},
    {key:'cpl',label:'CPL',sort:true},
    {key:'threeplus',label:'3+ LEADS',sort:true},
    {key:'cpThreeplus',label:'$/3+ LEAD',sort:true},
    {key:'wanted',label:'WANTED',sort:true},
    {key:'cpWanted',label:'$/WANTED',sort:true},
    {key:'sales',label:'SALES',sort:true},
    {key:'cpSale',label:'CPS',sort:true},
    {key:'ctrAll',label:'CTR (ALL)',sort:true},
    {key:'ctrLink',label:'CTR (LINK)',sort:true},
    {key:'cpm',label:'CPM',sort:true},
    {key:'impressions',label:'IMPR',sort:true}
  ];
  
  let thead='<tr>';
  cols.forEach(c=>{
    const isSorted=c.key===sortCol;
    const cls=(c.key==='idx'?'col-idx':(c.key==='name'?'col-name':''))+(isSorted?' sorted':'');
    const arrow=c.sort?'<span class="arr">'+(isSorted?(sortDir>0?'▲':'▼'):'▲')+'</span>':'';
    const click=c.sort?' onclick="doSort(\''+c.key+'\')"':'';
    thead+='<th class="'+cls+'"'+click+'>'+c.label+arrow+'</th>';
  });
  thead+='</tr>';
  
  let tbody='';
  rows.forEach((r,i)=>{
    tbody+='<tr>';
    cols.forEach(c=>{
      const cls=c.key==='idx'?'col-idx':(c.key==='name'?'col-name':'');
      let val='';
      switch(c.key){
        case'idx':val=i+1;break;
        case'name':val=isConcept?r.name+' <span style="color:#64748B;font-size:11px">('+r.variations+' ads)</span>':r.name;break;
        case'link':val=viewLink(r.link);break;
        case'status':val=statusBadge(r.status);break;
        case'variations':val=r.variations;break;
        case'cost':val=fmtSpend(r.cost);break;
        case'leads':val=fmtN(r.leads);break;
        case'cpl':val=badge(r.cpl,'cpl');break;
        case'threeplus':val=fmtN(r.threeplus);break;
        case'cpThreeplus':val=badge(r.cpThreeplus,'cpThreeplus');break;
        case'wanted':val=fmtN(r.wanted);break;
        case'cpWanted':val=badge(r.cpWanted,'cpWanted');break;
        case'sales':val=fmtN(r.sales);break;
        case'cpSale':val=badge(r.cpSale,'cps');break;
        case'ctrAll':val=fmtPct(r.ctrAll);break;
        case'ctrLink':val=fmtPct(r.ctrLink);break;
        case'cpm':val=r.cpm!=null?fmt$(r.cpm):'<span class="nd">—</span>';break;
        case'impressions':val=fmtN(r.impressions);break;
      }
      tbody+='<td class="'+cls+'">'+val+'</td>';
    });
    tbody+='</tr>';
  });
  
  document.getElementById('tblWrap').innerHTML='<table><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>';
  document.getElementById('rowCount').textContent=rows.length+' of '+DATA[activeTab].length+' creatives';
}

function doSort(col){
  if(sortCol===col)sortDir*=-1;
  else{sortCol=col;sortDir=-1;}
  render();
}

buildTabs();render();
</script>
